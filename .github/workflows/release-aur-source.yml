name: release-aur-source

on:
  # Trigger after release-linux completes (same as qbz-bin)
  workflow_run:
    workflows: ["release-linux"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.1.18)"
        required: true
        type: string
      pkgrel:
        description: "Package release number (bump for same-version rebuilds)"
        required: false
        default: "1"
        type: string

concurrency:
  group: aur-source-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update-aur:
    runs-on: ubuntu-latest
    # Only run on manual dispatch, or successful stable tag releases (no -rc)
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v') && !contains(github.event.workflow_run.head_branch, '-rc')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            REF="$WORKFLOW_HEAD_BRANCH"
            if [[ ! "$REF" =~ ^v[0-9]+(\.[0-9]+){1,3}([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid workflow_run head branch for release: $REF"
              exit 1
            fi
            VERSION="${REF#v}"
          else
            VERSION="$DISPATCH_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Wait for source tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Verifying GitHub source archive is available..."
          SOURCE_URL="https://github.com/vicrodh/qbz/archive/refs/tags/v${VERSION}.tar.gz"
          HTTP_CODE=$(curl -sL -o /dev/null -w "%{http_code}" "$SOURCE_URL")
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "Source archive not found at $SOURCE_URL (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Source archive available"

      - name: Get source tarball checksum
        id: checksums
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SOURCE_URL="https://github.com/vicrodh/qbz/archive/refs/tags/v${VERSION}.tar.gz"
          echo "Downloading: $SOURCE_URL"
          curl -fsSL -o /tmp/qbz-source.tar.gz "$SOURCE_URL"
          SHA256=$(sha256sum /tmp/qbz-source.tar.gz | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "Source checksum: $SHA256"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repo
        run: |
          git clone ssh://aur@aur.archlinux.org/qbz.git /tmp/aur-qbz
          cd /tmp/aur-qbz
          git checkout master 2>/dev/null || git checkout -b master

      - name: Determine pkgrel
        id: pkgrel
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "pkgrel=${{ inputs.pkgrel || '1' }}" >> "$GITHUB_OUTPUT"
          else
            echo "pkgrel=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Update PKGBUILD
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PKGREL: ${{ steps.pkgrel.outputs.pkgrel }}
          SHA256: ${{ steps.checksums.outputs.sha256 }}
        run: |
          cd /tmp/aur-qbz

          # Copy PKGBUILD from main repo (source of truth)
          cp ${{ github.workspace }}/packaging/aur-source/PKGBUILD .

          # Update version, pkgrel, and checksum
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${PKGREL}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD

          echo "=== Updated PKGBUILD ==="
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd /tmp/aur-qbz
          docker run --rm -v "$PWD":/pkg -w /pkg -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) archlinux:latest bash -c "
            pacman -Sy --noconfirm pacman-contrib sudo
            useradd -m builder
            chown -R builder:builder /pkg
            sudo -u builder makepkg --printsrcinfo > .SRCINFO
            chown -R \$HOST_UID:\$HOST_GID /pkg
          "
          cat .SRCINFO

      - name: Commit and push to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd /tmp/aur-qbz
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to v${VERSION}"
          git push
