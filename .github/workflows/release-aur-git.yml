name: release-aur-git

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/release-aur.yml'
      - '.github/workflows/release-aur-source.yml'
  workflow_dispatch:

concurrency:
  group: aur-git-publish
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-aur:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for pkgver()

      - name: Compute pkgver
        id: pkgver
        run: |
          REVCOUNT=$(git rev-list --count HEAD)
          SHORTHASH=$(git rev-parse --short HEAD)
          PKGVER="r${REVCOUNT}.${SHORTHASH}"
          echo "pkgver=$PKGVER" >> "$GITHUB_OUTPUT"
          echo "Computed pkgver: $PKGVER"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          echo "Host aur.archlinux.org" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/aur" >> ~/.ssh/config
          echo "  User aur" >> ~/.ssh/config
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Clone AUR repo
        run: |
          git clone ssh://aur@aur.archlinux.org/qbz-git.git /tmp/aur-qbz-git
          cd /tmp/aur-qbz-git
          git checkout master 2>/dev/null || git checkout -b master

      - name: Update PKGBUILD
        env:
          PKGVER: ${{ steps.pkgver.outputs.pkgver }}
        run: |
          cd /tmp/aur-qbz-git

          # Copy PKGBUILD from main repo (source of truth)
          cp ${{ github.workspace }}/packaging/aur-git/PKGBUILD .

          # Update pkgver to current value (so .SRCINFO reflects it)
          sed -i "s/^pkgver=.*/pkgver=${PKGVER}/" PKGBUILD

          echo "=== Updated PKGBUILD ==="
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd /tmp/aur-qbz-git
          docker run --rm -v "$PWD":/pkg -w /pkg -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) archlinux:latest bash -c "
            pacman -Sy --noconfirm pacman-contrib sudo git
            useradd -m builder
            chown -R builder:builder /pkg
            sudo -u builder makepkg --printsrcinfo > .SRCINFO
            chown -R \$HOST_UID:\$HOST_GID /pkg
          "
          cat .SRCINFO

      - name: Commit and push to AUR
        env:
          PKGVER: ${{ steps.pkgver.outputs.pkgver }}
        run: |
          cd /tmp/aur-qbz-git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add PKGBUILD .SRCINFO

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update to ${PKGVER}"
            git push
          fi
